name: SwiftWave Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/saveslate-web
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/saveslate-api

jobs:
  build-web:
    name: Build web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract web image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.swiftwave
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-api:
    name: Build api image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract api image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-web:
    name: Trigger web redeploy
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - name: Trigger SwiftWave web webhook
        env:
          WEBHOOK_URL: ${{ secrets.SWIFTWAVE_WEBHOOK_WEB }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "SWIFTWAVE_WEBHOOK_WEB is not set; skipping web redeploy."
            exit 0
          fi

          curl --fail --show-error --silent \
            -X POST \
            -H "Content-Type: application/json" \
            --data '{"trigger":"github-actions","app":"web"}' \
            "$WEBHOOK_URL"

      - name: Trigger Dokploy web webhook
        env:
          WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_WEB }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DOKPLOY_WEBHOOK_WEB is not set; skipping web redeploy."
            exit 0
          fi

          curl --fail --show-error --silent \
            -X POST \
            -H "Content-Type: application/json" \
            --data '{"trigger":"github-actions","app":"web"}' \
            "$WEBHOOK_URL"

  deploy-api:
    name: Trigger api redeploy
    runs-on: ubuntu-latest
    needs: build-api
    steps:
      - name: Trigger SwiftWave api webhook
        env:
          WEBHOOK_URL: ${{ secrets.SWIFTWAVE_WEBHOOK_API }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "SWIFTWAVE_WEBHOOK_API is not set; skipping api redeploy."
            exit 0
          fi

          curl --fail --show-error --silent \
            -X POST \
            -H "Content-Type: application/json" \
            --data '{"trigger":"github-actions","app":"api"}' \
            "$WEBHOOK_URL"

      - name: Trigger Dokploy api webhook
        env:
          WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_API }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DOKPLOY_WEBHOOK_API is not set; skipping api redeploy."
            exit 0
          fi

          curl --fail --show-error --silent \
            -X POST \
            -H "Content-Type: application/json" \
            --data '{"trigger":"github-actions","app":"api"}' \
            "$WEBHOOK_URL"
