# Development overrides — auto-loaded by `docker compose up`
# For production, run: docker compose -f docker-compose.yml up

services:
  db:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: saveslate

  api:
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://saveslate:saveslate@db:5432/saveslate
      SECRET_KEY: dev-secret-key
      CSRF_SECRET_KEY: dev-csrf-secret
      CORS_ORIGINS: http://localhost:5173,http://localhost:4173
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app

  web:
    profiles:
      - prod
