worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;

    # Gzip compression
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"       always;
    add_header X-Content-Type-Options "nosniff"           always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self';" always;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ---------------------------------------------------------------
        # Static assets (JS, CSS, images) — long cache, immutable
        # Vite hashes filenames so cache-busting is automatic
        # ---------------------------------------------------------------
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ---------------------------------------------------------------
        # SPA fallback — serve index.html for all non-file routes
        # ---------------------------------------------------------------
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
